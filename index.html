<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>95% Fail Game</title>

<!-- PWA Support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: Arial;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(45deg,#ff0057,#3b00ff);
  color:#fff;
}

.container{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:10px;
  text-align:center;
}

.title{
  font-size:24px;
  background:#000;
  padding:10px;
  border-radius:10px;
  color:#00ffcc;
}

.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.question{
  font-size:12vw;
}

.answer{
  font-size:14vw;
  color:yellow;
}

.text{
  font-size:5vw;
}

.timer{
  font-size:8vw;
  background:white;
  color:black;
  display:inline-block;
  padding:5px 15px;
  border-radius:10px;
  margin-top:10px;
}

.subscribe{
  font-size:5vw;
  color:#ffea00;
  font-weight:bold;
  padding:10px;
  background:rgba(0,0,0,0.5);
  border-radius:10px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.4;}
}
</style>
</head>

<body>

<div class="container">

<div class="title">
৯৫% মানুষ ভুল করে 😱<br>
তুমি কি পারবে সঠিক উত্তর দিতে? 🤯
</div>

<div class="middle">
<div class="question" id="q"></div>
<div class="answer" id="a"></div>

<div class="text">
এটা কি ঠিক? 🤔<br>
ভুল হলে কমেন্ট করুন!
</div>

<div class="timer" id="t">10</div>
</div>

<div class="subscribe">
চ্যানেলটি সাবস্ক্রাইব করুন 🔔
</div>

</div>

<script>
let time=10;

function generate(){
let a=Math.floor(Math.random()*10)+1;
let b=Math.floor(Math.random()*10)+1;

let ops=["+","-"];
let op=ops[Math.floor(Math.random()*2)];

let fake=(Math.random()>0.5)?(a+b+2):(a-b-1);

document.getElementById("q").innerText=`${a} ${op} ${b} = ?`;
document.getElementById("a").innerText=fake;

time=10;
}

setInterval(()=>{
time--;
document.getElementById("t").innerText=time;

if(time===0){
generate();
}
},1000);

generate();

// Hide browser UI trick
window.onload = () => {
  setTimeout(() => window.scrollTo(0,1), 100);
};
</script>

</body>
  </html>
