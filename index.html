<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">

<!-- 🔥 Perfect Mobile Fit -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

<title>95% Fail Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: Arial, sans-serif;
  touch-action: manipulation;
}

/* Safe area for notch phones */
body{
  padding: env(safe-area-inset-top) 
           env(safe-area-inset-right) 
           env(safe-area-inset-bottom) 
           env(safe-area-inset-left);

  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(45deg,#ff0057,#3b00ff);
  color:#fff;
}

/* Main container */
.container{
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
  padding:10px;
}

/* Title */
.title{
  font-size:5vw;
  background:#000;
  padding:10px;
  border-radius:10px;
  color:#00ffcc;
  font-weight:bold;
}

/* Middle */
.middle{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.question{
  font-size:12vw;
}

.answer{
  font-size:14vw;
  color:yellow;
}

.text{
  font-size:5vw;
  margin-top:10px;
}

/* Timer */
.timer{
  font-size:8vw;
  background:white;
  color:black;
  display:inline-block;
  padding:5px 15px;
  border-radius:10px;
  margin-top:10px;
}

/* Bottom */
.bottom{
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}

.subscribe{
  font-size:5vw;
  color:#ffea00;
  font-weight:bold;
}

.install{
  font-size:4vw;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<!-- Top -->
<div class="title">
৯৫% মানুষ ভুল করে 😱<br>
তুমি কি পারবে সঠিক উত্তর দিতে? 🤯
</div>

<!-- Middle -->
<div class="middle">
  <div class="question" id="q"></div>
  <div class="answer" id="a"></div>

  <div class="text">
    এটা কি ঠিক? 🤔<br>
    ভুল হলে কমেন্ট করুন!
  </div>

  <div class="timer" id="t">10</div>
</div>

<!-- Bottom -->
<div class="bottom">
  <div class="subscribe">চ্যানেলটি সাবস্ক্রাইব করুন 🔔</div>
  <div class="install">📲কোন জেলা থেকে ভিডিওটি দেখতেছেন</div>
</div>

</div>

<script>
let time = 10;

function generate(){
  let a = Math.floor(Math.random()*10)+1;
  let b = Math.floor(Math.random()*10)+1;

  let ops = ["+","-"];
  let op = ops[Math.floor(Math.random()*2)];

  let fake = (Math.random()>0.5) ? (a+b+2) : (a-b-1);

  document.getElementById("q").innerText = `${a} ${op} ${b} = ?`;
  document.getElementById("a").innerText = fake;

  time = 10;
}

setInterval(()=>{
  time--;
  document.getElementById("t").innerText = time;

  if(time === 0){
    generate();
  }
},1000);

generate();

/* 🔥 Anti Zoom */
document.addEventListener('gesturestart', function (e) {
  e.preventDefault();
});
</script>

</body>
</html>
